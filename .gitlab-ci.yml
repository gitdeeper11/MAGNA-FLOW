# MAGNA-FLOW GitLab CI/CD Pipeline (E-LAB-09)

stages:
  - test
  - build
  - deploy
  - mirror

variables:
  PYTHON_VERSION: "3.11"

cache:
  paths:
    - .cache/pip
    - .venv

before_script:
  - apt-get update -qq && apt-get install -y -qq python3-pip
  - pip install --upgrade pip
  - pip install pytest pytest-cov build twine

test-python-3-11:
  stage: test
  image: python:3.11-slim
  script:
    - pip install -e .
    - pip install pytest pytest-cov
    - pytest tests/ -v --cov=magna_flow
  coverage: '/TOTAL.+ ([0-9]{1,3}%)/'

test-python-3-12:
  stage: test
  image: python:3.12-slim
  script:
    - pip install -e .
    - pip install pytest pytest-cov
    - pytest tests/ -v --cov=magna_flow

test-mhd:
  stage: test
  image: python:3.11-slim
  script:
    - pip install -e .
    - python bin/run_control.py --regime tokamak_elm --steps 1000 --verbose

build-package:
  stage: build
  image: python:3.11-slim
  script:
    - pip install build
    - python -m build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

deploy-pypi:
  stage: deploy
  image: python:3.11-slim
  only:
    - tags
  script:
    - pip install twine
    - twine upload --username __token__ --password $PYPI_TOKEN dist/*
  environment:
    name: pypi
    url: https://pypi.org/project/magna-flow-engine/

mirror-to-github:
  stage: mirror
  image: alpine/git:latest
  only:
    - main
    - tags
  before_script:
    - apk add --no-cache git openssh-client
    - mkdir -p ~/.ssh
    - echo "$GITHUB_DEPLOY_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan github.com >> ~/.ssh/known_hosts
  script:
    - git push --mirror git@github.com:gitdeeper11/MAGNA-FLOW.git

mirror-to-bitbucket:
  stage: mirror
  image: alpine/git:latest
  only:
    - main
    - tags
  script:
    - git push --mirror https://x-token-auth:$BITBUCKET_TOKEN@bitbucket.org/gitdeeper-11/magna-flow.git

mirror-to-codeberg:
  stage: mirror
  image: alpine/git:latest
  only:
    - main
    - tags
  script:
    - git push --mirror https://gitdeeper11:$CODEBERG_TOKEN@codeberg.org/gitdeeper11/MAGNA-FLOW.git

pages:
  stage: deploy
  image: python:3.11-slim
  only:
    - main
  script:
    - pip install sphinx sphinx-rtd-theme
    - cd docs && make html
    - mv _build/html ../public/
  artifacts:
    paths:
      - public
  environment:
    name: pages
    url: https://gitdeeper11.gitlab.io/MAGNA-FLOW
